# improve colors
set -g default-terminal 'screen-256color'

# act like vim
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# start window numbers at 1 to match keyboard order
set -g base-index 1
set-window-option -g pane-base-index 1

# skip "kill-pane 1? (y/n)" prompt
bind-key x kill-pane

# don't exit from tmux when closing a session
set -g detach-on-destroy off

# renumber windows sequentially after closing any of them
set -g renumber-windows on

# increase scrollback lines
set -g history-limit 10000

# don't suspend-client
unbind-key C-z

# --- local overrides (formerly tmux.conf.local) ---

# remap prefix to Control + a
set -g prefix C-a
bind C-a send-prefix
unbind C-b

# quick toggle: Tab=last window (same session), Backspace=last session+window
bind Tab last-window
bind BSpace switch-client -l

# new panes/windows open in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# enable mouse support (click to focus panes, drag to resize, scroll)
set -g mouse on

# mouse drag selects within pane and copies to system clipboard on release
set -g copy-command "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# vim-style copy mode: v to select, y to yank to system clipboard
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# resize panes with prefix + Option+Arrow
bind -r M-Up resize-pane -U 5
bind -r M-Down resize-pane -D 5
bind -r M-Left resize-pane -L 5
bind -r M-Right resize-pane -R 5

# Pass extended key sequences (CSI-u) from Kitty through tmux to applications.
# Without this, Shift+Space is stripped to plain space before bubbletea sees it.
set -g extended-keys on
set -ga terminal-features '*:extkeys'

# allow Shift+Space and Shift+Enter to insert newlines in Copilot CLI
# Kitty sends \x1b[13;2u for Shift+Enter (via kitty.conf map); tmux intercepts
# it (extended-keys on) and translates to Escape+Enter (\x1b\r) which bubbletea
# recognizes. Same pattern for Shift+Space.
bind -n S-Enter send-keys Escape Enter
bind -n S-Space send-keys "\x1b[32;2u"

# dim inactive panes to make focused pane obvious
# colors set by `theme` script; these are catppuccin mocha defaults
set -g window-style 'bg=#11111b'
set -g window-active-style 'bg=#1e1e2e'

# thick bright border on active pane
set -g pane-active-border-style 'fg=#89b4fa,bold'
set -g pane-border-style 'fg=#585b70'
set -g pane-border-lines heavy

# label each pane: shows pane title or current path
set -g allow-passthrough on
set -g pane-border-status top
set -g pane-border-format ' #{?#{!=:#{pane_title},},#{pane_title},#{pane_current_path}} '

# --- status bar ---
set -g status-position bottom
set -g status-style 'bg=#11111b,fg=#cdd6f4'

# left: window list
set -g status-left ''
set -g status-left-length 0

# right: git branch + session name
set -g status-right '#[fg=#585b70]#{?window_zoomed_flag,🔍 ,}#{?#{==:#{pane_current_command},zsh},#(cd #{pane_current_path} && git branch --show-current 2>/dev/null),} #[fg=#89b4fa,bold] #{session_name}'
set -g status-right-length 60

# monitor windows for activity/bells
setw -g monitor-activity on
setw -g monitor-bell on
set -g visual-activity off

# window tabs: number:name with active highlight + alert indicator
set -g window-status-format '#[fg=#7f849c] #I:#W#{?window_bell_flag,🔔,#{?window_activity_flag,•,}} '
set -g window-status-current-format '#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W#{?window_zoomed_flag, 🔍,} '
set -g window-status-separator ''
set -g window-status-bell-style 'fg=#f38ba8,bold'
set -g window-status-activity-style 'fg=#f9e2af'

# --- plugins (via TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# resurrect: save with prefix+Ctrl-s, restore with prefix+Ctrl-r
set -g @resurrect-capture-pane-contents 'on'

# Bootstrap TPM (auto-install if missing)
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm 2>/dev/null'"
run '~/.tmux/plugins/tpm/tpm'
# session picker (sesh + fzf): prefix+S
bind S display-popup -E -w 80% -h 80% "$HOME/.local/bin/sesh-picker"

# sesh: quick-toggle last session with prefix+L
bind L run-shell "sesh last"

# sesh: jump to project root with prefix+R
bind R run-shell "sesh root"

# Starship prompt configuration
# Docs: https://starship.rs/config/

format = """
$env_var\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$git_metrics\
$nodejs\
$golang\
$ruby\
$cmd_duration\
$line_break\
$character"""

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "bold cyan"

[directory]
truncation_length = 5
truncate_to_repo = false

[git_branch]
format = "[$symbol$branch]($style) "
symbol = ""
style = "green"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "red"
modified = "*"
untracked = "?"
staged = "+"
deleted = "✗"
stashed = "📦"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[git_metrics]
disabled = false
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
added_style = "green"
deleted_style = "red"

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "yellow"

[character]
success_symbol = "[\\$](bold green)"
error_symbol = "[\\$](bold red)"

[nodejs]
format = "[$symbol($version)]($style) "
symbol = "⬢ "
detect_extensions = []

[golang]
format = "[$symbol($version)]($style) "
symbol = "go "

[ruby]
format = "[$symbol($version)]($style) "
symbol = "rb "

[time]
disabled = true

[env_var.CODESPACE_SHORT_NAME]
format = "\\[[$env_value]($style)\\] "
style = "cyan"

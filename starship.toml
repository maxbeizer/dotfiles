# Starship prompt configuration
# Docs: https://starship.rs/config/

format = """
$env_var\
$directory\
$git_branch\
$git_status\
$git_state\
$git_metrics\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 5
truncate_to_repo = false

[git_branch]
format = "[$symbol$branch]($style) "
symbol = ""
style = "green"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "red"
modified = "*"
untracked = "?"
staged = "+"
deleted = "✗"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[git_metrics]
disabled = false
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
added_style = "green"
deleted_style = "red"

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "yellow"

[character]
success_symbol = "[\\$](bold green)"
error_symbol = "[\\$](bold red)"

[env_var.CODESPACE_SHORT_NAME]
format = "\\[[$env_value]($style)\\] "
style = "cyan"

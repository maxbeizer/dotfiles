# sesh configuration
# Docs: https://github.com/joshmedeski/sesh

dir_length = 2

[default_session]
startup_command = "gh copilot --yolo"
preview_command = "eza --all --git --icons --color=always {}"

[[wildcard]]
pattern = "~/code/one-to-one/*"
startup_command = "tmux split-window -h \\; send-keys 'gh pr list' Enter \\; select-pane -L && gh copilot --yolo"

[[session]]
name = "dotfiles"
path = "~/dotfiles"

[[session]]
name = "tome"
path = "~/code/1-1-Repo-maxbeizer"
startup_command = "tmux split-window -h \\; send-keys 'lg' Enter \\; select-pane -L && gh copilot --yolo"

[[session]]
name = "dotcom"
path = "~/code/github/github"
startup_command = "tv codespaces"

[[session]]
name = "life"
path = "~/code/life"

[[session]]
name = "afraid_not"
path = "~/code/afraid_not"

[[session]]
name = "tmux config"
path = "~/dotfiles"
startup_command = "nvim tmux.conf"
preview_command = "bat --color=always ~/dotfiles/tmux.conf"

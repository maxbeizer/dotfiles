[metadata]
name = "channels"
description = "Select a television channel"
requirements = ["tv"]

[source]
command = ["tv list-channels"]

[preview]
command = "cat ${XDG_CONFIG_HOME:-$HOME/.config}/television/cable/{}.toml 2>/dev/null || echo 'Built-in channel'"

[keybindings]
enter = "actions:channel-enter"

[actions.channel-enter]
description = "Enter a television channel"
command = "tv {}"
mode = "execute"
